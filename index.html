<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MEG&amp;ViS - Order Different. Taste Different.</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body>
  <div id="app"></div>

  <!-- React + Babel (no build step) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

  <!-- Asset map (plain JS — available before Babel scripts execute) -->
  <script src="assets/js/assets.js"></script>

  <!-- Components — order matters: each file reads from window, exports to window -->
  <script type="text/babel" src="assets/js/primitives.jsx"></script>
  <script type="text/babel" src="assets/js/nav.jsx"></script>
  <script type="text/babel" src="assets/js/hero.jsx"></script>
  <script type="text/babel" src="assets/js/how-it-works.jsx"></script>
  <script type="text/babel" src="assets/js/menu-preview.jsx"></script>
  <script type="text/babel" src="assets/js/vibe.jsx"></script>
  <script type="text/babel" src="assets/js/location.jsx"></script>
  <script type="text/babel" src="assets/js/footer.jsx"></script>
  <script type="text/babel" src="assets/js/app.jsx"></script>
</body>
</html>
